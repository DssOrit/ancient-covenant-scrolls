<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Quote Card Generator &mdash; Load</title>
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<style>
:root{--bg:#0a0a14;--bg2:#141422;--bg3:#1f1f30;--fg:#e9e9f0;--mute:#9aa0b0;--accent:#7c3aed;--ok:#4ade80;--warn:#facc15;--err:#ff6e6e;--border:#2a2a40}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 18px;background:linear-gradient(180deg,#150a28 0,#0a0514 100%);border-bottom:1px solid var(--border)}
header a.back{color:var(--fg);text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.05)}
header h1{margin:0;font-size:16px;font-weight:800;flex:1}
.layout{display:grid;grid-template-columns:340px 1fr;gap:14px;max-width:1280px;margin:14px auto;padding:0 14px 80px}
@media (max-width:880px){.layout{grid-template-columns:1fr}}
.controls{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 90px);overflow:auto}
.controls h3{margin:0;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mute)}
label{display:block;font-size:11.5px;color:var(--mute);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:#0a0e18;color:var(--fg);font:inherit;font-size:13px}
textarea{min-height:90px;resize:vertical;line-height:1.5}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--fg);font-weight:700;font-size:13px;cursor:pointer}
.btn.primary{background:var(--accent);border-color:var(--accent)}
.btn.danger{border-color:rgba(255,110,110,.4);color:var(--err)}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.stage{position:relative;background:#000;border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:14px}
canvas#card{display:block;max-width:100%;max-height:calc(100vh - 120px);background:#000;box-shadow:0 8px 30px rgba(0,0,0,.6);border-radius:6px}
.toggleRow{display:flex;align-items:center;gap:8px;font-size:13px}
.toggleRow input[type=checkbox]{width:16px;height:16px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a1a26;color:#fff;padding:10px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none}
.toast.on{display:block}
</style>
</head>
<body>
<header>
  <a class="back" href="../">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 18 4 12 10 6"/></svg>
    Back to Load
  </a>
  <h1>Quote Card Generator</h1>
  <a class="back" href="./help.html#quotecard" title="How it works">How it works</a>
</header>
<div class="layout">

<div class="controls">
  <h3>Text</h3>
  <div><label>Quote</label><textarea id="quote">"The Lord is my shepherd; I shall not want."</textarea></div>
  <div><label>Attribution (optional)</label><input id="attrib" value="Psalm 23:1"></div>

  <h3>Layout</h3>
  <div class="row">
    <div><label>Format</label>
      <select id="fmt">
        <option value="1080x1080">Square 1080</option>
        <option value="1080x1350" selected>Portrait 4:5</option>
        <option value="1080x1920">Story 9:16</option>
        <option value="1920x1080">Landscape 16:9</option>
        <option value="1500x500">Header 3:1</option>
      </select>
    </div>
    <div><label>Quote font</label>
      <select id="font">
        <option value="'Playfair Display', serif">Playfair (serif)</option>
        <option value="'Atkinson Hyperlegible', sans-serif" selected>Atkinson (readability-friendly)</option>
        <option value="Inter, sans-serif">Inter (sans)</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Times New Roman', serif">Times</option>
        <option value="'Courier New', monospace">Courier</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div><label>Quote size</label><input id="qsize" type="range" min="40" max="160" value="76"></div>
    <div><label>Italic</label>
      <select id="italic"><option value="normal">Off</option><option value="italic">On</option></select>
    </div>
  </div>
  <div class="row">
    <div><label>Text color</label><input id="textColor" type="color" value="#ffffff"></div>
    <div><label>Attribution color</label><input id="attribColor" type="color" value="#fde68a"></div>
  </div>

  <h3>Background</h3>
  <div class="row">
    <div><label>Mode</label>
      <select id="bgMode">
        <option value="solid">Solid color</option>
        <option value="gradient" selected>Gradient</option>
        <option value="image">Image</option>
      </select>
    </div>
    <div><label>Solid color</label><input id="bgColor" type="color" value="#101020"></div>
  </div>
  <div class="row">
    <div><label>Gradient A</label><input id="gA" type="color" value="#1f1147"></div>
    <div><label>Gradient B</label><input id="gB" type="color" value="#7c3aed"></div>
  </div>
  <div><label>Background image (optional)</label><input id="bgImage" type="file" accept="image/*"></div>
  <div class="row">
    <div><label>Image dim (overlay strength)</label><input id="dim" type="range" min="0" max="80" value="45"></div>
    <div><label>Vignette</label><input id="vignette" type="range" min="0" max="80" value="30"></div>
  </div>

  <h3>Frame</h3>
  <div class="toggleRow"><input id="border" type="checkbox" checked><label for="border" style="margin:0">Show 1px border</label></div>
  <div><label>Padding</label><input id="pad" type="range" min="20" max="180" value="80"></div>

  <h3>Export</h3>
  <div class="row">
    <div><label>Format</label>
      <select id="outFmt"><option value="image/png">PNG</option><option value="image/jpeg">JPEG</option><option value="image/webp">WEBP</option></select>
    </div>
    <div><label>Quality (JPEG/WEBP)</label><input id="q" type="range" min="60" max="100" value="92"></div>
  </div>
  <div class="bar">
    <button class="btn primary" id="dl">Download card</button>
    <button class="btn" id="copyBtn">Copy image</button>
    <button class="btn danger" id="reset">Reset</button>
  </div>
</div>

<div class="stage">
  <canvas id="card" width="1080" height="1350"></canvas>
</div>

</div>
<div id="toast" class="toast"></div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var toastEl = $('toast');
  function toast(m){ toastEl.textContent = m; toastEl.classList.add('on'); setTimeout(function(){ toastEl.classList.remove('on'); }, 1800); }
  function downloadBlob(blob, name){ var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100); }

  var bgImg = null;

  function setSize(){
    var v = $('fmt').value.split('x');
    $('card').width = parseInt(v[0],10);
    $('card').height = parseInt(v[1],10);
  }

  function wrap(ctx, text, x, y, maxW, lineH){
    var words = text.split(/\s+/);
    var line = '';
    var lines = [];
    for (var i = 0; i < words.length; i++) {
      var test = line ? (line + ' ' + words[i]) : words[i];
      var w = ctx.measureText(test).width;
      if (w > maxW && line) { lines.push(line); line = words[i]; }
      else line = test;
    }
    if (line) lines.push(line);
    var totalH = lines.length * lineH;
    var startY = y - totalH/2 + lineH/2;
    lines.forEach(function(l, i){ ctx.fillText(l, x, startY + i*lineH); });
    return totalH;
  }

  function render(){
    var c = $('card');
    var ctx = c.getContext('2d');
    var W = c.width, H = c.height;
    ctx.clearRect(0,0,W,H);

    var mode = $('bgMode').value;
    if (mode === 'solid') {
      ctx.fillStyle = $('bgColor').value;
      ctx.fillRect(0,0,W,H);
    } else if (mode === 'gradient') {
      var g = ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0, $('gA').value);
      g.addColorStop(1, $('gB').value);
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);
    } else if (mode === 'image') {
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,W,H);
      if (bgImg) {
        var ratio = Math.max(W / bgImg.naturalWidth, H / bgImg.naturalHeight);
        var iw = bgImg.naturalWidth * ratio, ih = bgImg.naturalHeight * ratio;
        ctx.drawImage(bgImg, (W-iw)/2, (H-ih)/2, iw, ih);
      }
      var dim = parseInt($('dim').value,10) / 100;
      if (dim > 0) {
        ctx.fillStyle = 'rgba(0,0,0,' + dim + ')';
        ctx.fillRect(0,0,W,H);
      }
    }

    var vig = parseInt($('vignette').value,10) / 100;
    if (vig > 0) {
      var rg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)/3, W/2, H/2, Math.max(W,H)/1.2);
      rg.addColorStop(0, 'rgba(0,0,0,0)');
      rg.addColorStop(1, 'rgba(0,0,0,' + vig + ')');
      ctx.fillStyle = rg;
      ctx.fillRect(0,0,W,H);
    }

    var pad = parseInt($('pad').value, 10);
    var qSize = parseInt($('qsize').value, 10);
    var quote = $('quote').value || '';
    var attrib = $('attrib').value || '';
    var font = $('font').value;
    var ital = $('italic').value;

    ctx.fillStyle = $('textColor').value;
    ctx.font = ital + ' 700 ' + qSize + 'px ' + font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.45)';
    ctx.shadowBlur = 20;
    var maxW = W - pad*2;
    var lineH = qSize * 1.25;
    var quoteY = H/2 - (attrib ? qSize : 0);
    wrap(ctx, quote, W/2, quoteY, maxW, lineH);

    ctx.shadowBlur = 0;
    if (attrib) {
      ctx.fillStyle = $('attribColor').value;
      ctx.font = '500 ' + Math.round(qSize*0.45) + 'px ' + font;
      ctx.fillText('— ' + attrib, W/2, H/2 + lineH * Math.max(2, Math.ceil(quote.split(/\s+/).length/8)));
    }

    if ($('border').checked) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.strokeRect(pad/2, pad/2, W - pad, H - pad);
    }
  }

  function rerender(){
    setSize();
    render();
  }

  ['quote','attrib','fmt','font','qsize','italic','textColor','attribColor','bgMode','bgColor','gA','gB','dim','vignette','border','pad'].forEach(function(id){
    var el = $(id);
    el.addEventListener('input', rerender);
    el.addEventListener('change', rerender);
  });

  $('bgImage').addEventListener('change', function(e){
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var img = new Image();
    img.onload = function(){ bgImg = img; $('bgMode').value = 'image'; rerender(); };
    img.src = URL.createObjectURL(f);
  });

  $('dl').addEventListener('click', function(){
    var fmt = $('outFmt').value;
    var q = parseInt($('q').value,10) / 100;
    $('card').toBlob(function(blob){
      if (!blob) { toast('Export failed.'); return; }
      var ext = fmt === 'image/png' ? 'png' : fmt === 'image/webp' ? 'webp' : 'jpg';
      downloadBlob(blob, 'quote-' + new Date().toISOString().slice(0,16).replace(/[:T]/g,'-') + '.' + ext);
    }, fmt, q);
  });
  $('copyBtn').addEventListener('click', function(){
    if (!navigator.clipboard || !window.ClipboardItem) { toast('Clipboard image API unavailable.'); return; }
    $('card').toBlob(function(blob){
      if (!blob) { toast('Capture failed.'); return; }
      navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(function(){ toast('Copied PNG.'); }).catch(function(e){ toast('Copy blocked: ' + e.message); });
    }, 'image/png');
  });
  $('reset').addEventListener('click', function(){
    bgImg = null;
    $('quote').value = '"The Lord is my shepherd; I shall not want."';
    $('attrib').value = 'Psalm 23:1';
    $('fmt').value = '1080x1350';
    $('font').value = "'Atkinson Hyperlegible', sans-serif";
    $('qsize').value = 76;
    $('italic').value = 'normal';
    $('textColor').value = '#ffffff';
    $('attribColor').value = '#fde68a';
    $('bgMode').value = 'gradient';
    $('bgColor').value = '#101020';
    $('gA').value = '#1f1147';
    $('gB').value = '#7c3aed';
    $('dim').value = 45;
    $('vignette').value = 30;
    $('border').checked = true;
    $('pad').value = 80;
    rerender();
  });

  rerender();
  // Re-render once when web fonts have settled.
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(rerender);
})();
</script>
</body>
</html>
